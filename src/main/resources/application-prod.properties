# Production config — values come from Render environment variables
spring.application.name=foodiesapi

spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=fooddelivery

storage.local=true
storage.local.path=/tmp/uploads

aws.access.key=dummy
aws.secret.key=dummy
aws.region=ap-south-1
aws.s3.bucketName=foodies-foods-s1

jwt.secret.key=${JWT_SECRET}

razorpay.key=${RAZORPAY_KEY}
razorpay.secret=${RAZORPAY_SECRET}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=${PORT:8080}

cors.allowed-origins=${CORS_ORIGINS}
